<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearHelp Authentication</title>
    <script>
        if (localStorage.getItem("token")) {
            window.location.href = "index.html";
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tabs .active {
            border-color: #ff3b3b;
            color: #ff3b3b;
        }

        form {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        form.active {
            display: flex;
        }

        input,
        select {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            outline: none;
        }

        button.submit-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #ff3b3b;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button.submit-btn:hover {
            background: #ff1f1f;
        }

        .small-text {
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>NearHelp Access</h2>

        <div class="tabs">
            <button id="signinTab" class="active">Sign In</button>
            <button id="signupTab">Sign Up</button>
        </div>

        <!-- SIGN IN -->
        <form id="signinForm" class="active">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="submit-btn" id="loginBtn">Login</button>
        </form>

        <!-- SIGN UP -->
        <form id="signupForm">
            <input type="text" id="signupName" placeholder="Full Name" required>
            <input type="email" id="signupEmail" placeholder="Email Address" required>
            <input type="password" id="signupPassword" placeholder="Password" required>

            <select id="signupRole" required>
                <option value="">Select Role</option>
                <option value="doctor">Doctor</option>
                <option value="police">Police</option>
                <option value="firefighter">Firefighter</option>
                <option value="volunteer">Volunteer</option>
                <option value="other">Other</option>
            </select>

            <input type="text" id="signupLocation" placeholder="Detecting Location..." readonly>

            <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>
        </form>

        <div class="small-text">Your location is used for emergency matching only.</div>

    </div>

    <script type="module">
        // Firebase Setup
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwBOQ9KPhlZfLJp_WrIZL4p3z6ktK3X-E",
            authDomain: "nit-hack-de.firebaseapp.com",
            projectId: "nit-hack-de",
            storageBucket: "nit-hack-de.firebasestorage.app",
            messagingSenderId: "795931621619",
            appId: "1:795931621619:web:4d68db464167b160995f86",
            measurementId: "G-KLHP9MX4B5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const signinTab = document.getElementById("signinTab");
        const signupTab = document.getElementById("signupTab");
        const signinForm = document.getElementById("signinForm");
        const signupForm = document.getElementById("signupForm");

        signinTab.onclick = () => {
            signinTab.classList.add("active");
            signupTab.classList.remove("active");
            signinForm.classList.add("active");
            signupForm.classList.remove("active");
        }

        signupTab.onclick = () => {
            signupTab.classList.add("active");
            signinTab.classList.remove("active");
            signupForm.classList.add("active");
            signinForm.classList.remove("active");
        }

        // Detect Location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                document.getElementById("signupLocation").value =
                    position.coords.latitude + "," + position.coords.longitude;
            });
        }

        // Signup Logic
        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("signupName").value;
            const email = document.getElementById("signupEmail").value;
            const password = document.getElementById("signupPassword").value;
            const role = document.getElementById("signupRole").value;
            const location = document.getElementById("signupLocation").value;

            try {
                // 1. Create User in Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Sync to MongoDB
                const res = await fetch("/api/auth/sync", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        firebaseUid: user.uid,
                        name,
                        email,
                        role,
                        location
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Account created successfully!");
                    localStorage.setItem("user", JSON.stringify({ email: user.email, uid: user.uid, name: name }));
                    signinTab.click();
                } else {
                    alert("Account created in Firebase, but sync failed: " + data.msg);
                }

            } catch (err) {
                alert("Creation Error: " + err.message);
                console.error(err);
            }
        });

        // Login Logic
        signinForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                // Login with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Get the ID Token
                const token = await user.getIdToken();

                // Save token & redirect
                localStorage.setItem("token", token);
                // Also save some basic user info if needed by frontend
                localStorage.setItem("user", JSON.stringify({ email: user.email, uid: user.uid }));

                window.location.href = "index.html";

            } catch (err) {
                alert("Login Error: " + err.message);
                console.error(err);
            }
        });
    </script>

</body>

</html>
